<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Website ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.box{
    width:340px;
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
    font-size:16px;
}

button{
    margin-top:18px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e6395d;
}

#error{
    margin-top:15px;
    color:red;
}

</style>

</head>
<body>

<div class="box">

<h1>🔒 Private Website</h1>

<p>Enter the password</p>

<input
type="password"
id="password"
placeholder="Password">

<button onclick="checkPassword()">
Open ❤️
</button>

<p id="error"></p>

</div>

<script>

function checkPassword(){

let pass=document.getElementById("password").value;

if(pass==="SweetestSoulForever14"){

window.location.href="home.html";

}else{

document.getElementById("error").innerHTML="Wrong Password ❤️";

}

}

document.getElementById("password").addEventListener("keypress",function(e){

if(e.key==="Enter"){

checkPassword();

}

});

</script>

</body>
</html>
